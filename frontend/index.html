<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scanner App - Auth Test</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Scanner App - Auth Test</h1>

    <div>
      <button id="tab-register">Register</button>
      <button id="tab-login">Login (demo)</button>
    </div>

    <form id="register-form">
      <div>
        <label for="reg-name">Name</label>
        <input id="reg-name" type="text" required />
      </div>
      <div>
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" required />
      </div>
      <div>
        <label for="reg-password">Password</label>
        <input id="reg-password" type="password" required />
      </div>
      <div>
        <label for="reg-role">Role</label>
        <select id="reg-role" required>
          <option value="student">Student</option>
          <option value="instructor">Instructor</option>
        </select>
      </div>
      <button type="submit" id="reg-submit">Register</button>
      <div id="reg-message"></div>
    </form>

    <form id="login-form" style="display: none">
      <div>
        <label for="login-email">Email</label>
        <input id="login-email" type="email" required />
      </div>
      <div>
        <label for="login-password">Password</label>
        <input id="login-password" type="password" required />
      </div>
      <button type="submit" id="login-submit">Login</button>
      <div id="login-message"></div>
    </form>

    <hr />

    <section id="qr-section">
      <h2>QR Code Test</h2>
      <button id="generate-qr">Generate QR Code</button>
      <button id="create-event">Create event</button>
      <div id="qr-message" class="message"></div>
      <br />
      <img id="qr-image" alt="Generated QR Code" style="max-width: 300px; display: none;" />
    </section>

    <p>
      Backend must be running on http://localhost:3001.<br />
      Register uses POST /api/users/register.<br />
      Login uses POST /api/users/login.<br />
      QR test uses GET /api/qr/test.
    </p>

    <script>
      const API_BASE = "http://localhost:3001/api";

      const tabRegister = document.getElementById("tab-register");
      const tabLogin = document.getElementById("tab-login");
      const registerForm = document.getElementById("register-form");
      const loginForm = document.getElementById("login-form");

      const qrButton = document.getElementById("generate-qr");
      const qrImage = document.getElementById("qr-image");
      const qrMessage = document.getElementById("qr-message");
      const createEventButton = document.getElementById("create-event");

      tabRegister.addEventListener("click", () => {
        tabRegister.classList.add("active");
        tabLogin.classList.remove("active");
        registerForm.style.display = "";
        loginForm.style.display = "none";
      });

      tabLogin.addEventListener("click", () => {
        tabLogin.classList.add("active");
        tabRegister.classList.remove("active");
        loginForm.style.display = "";
        registerForm.style.display = "none";
      });

      // Register handler -> POST /api/users/register
      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("reg-name").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const password = document.getElementById("reg-password").value;
        const role = document.getElementById("reg-role").value;
        const msgEl = document.getElementById("reg-message");
        const btn = document.getElementById("reg-submit");

        msgEl.textContent = "";
        msgEl.className = "message";
        btn.disabled = true;

        try {
          const res = await fetch(API_BASE + "/users/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password, role }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            throw new Error(data.error || "Registration failed");
          }

          msgEl.textContent =
            "Registered! User ID: " + (data._id || JSON.stringify(data));
          msgEl.classList.add("success");
          registerForm.reset();
        } catch (err) {
          msgEl.textContent = err.message || "Something went wrong";
          msgEl.classList.add("error");
        } finally {
          btn.disabled = false;
        }
      });

      // Login handler -> POST /api/users/login
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const msgEl = document.getElementById("login-message");
        const btn = document.getElementById("login-submit");

        msgEl.textContent = "";
        msgEl.className = "message";
        btn.disabled = true;

        try {
          const res = await fetch(API_BASE + "/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            throw new Error(data.error || "Login failed");
          }

          msgEl.textContent =
            "Logged in as " +
            (data.user?.name || "") +
            " (" +
            (data.user?.role || "") +
            ")";
          msgEl.classList.add("success");
        } catch (err) {
          msgEl.textContent = err.message || "Something went wrong";
          msgEl.classList.add("error");
        } finally {
          btn.disabled = false;
        }
      });

      // QR Code handler -> GET /api/qr/test
      qrButton.addEventListener("click", async () => {
        qrMessage.textContent = "";
        qrMessage.className = "message";
        qrButton.disabled = true;

        try {
          const testQRHealth = "/health/qr";
          const QR = "/qr";
          const res = await fetch(API_BASE + testQRHealth);

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            throw new Error(data.error || "Failed to generate QR code");
          }

          qrImage.src = data.qr;
          qrImage.style.display = "block";
          qrMessage.textContent = "QR code generated successfully!";
          qrMessage.classList.add("success");
        } catch (err) {
          qrImage.style.display = "none";
          qrMessage.textContent = err.message || "Something went wrong";
          qrMessage.classList.add("error");
        } finally {
          qrButton.disabled = false;
        }
      });

      // Create event handler -> POST /api/events
      createEventButton.addEventListener("click", async () => {
        qrMessage.textContent = "";
        qrMessage.className = "message";
        createEventButton.disabled = true;

        try {
          const payload = {
            title: "Test Event " + new Date().toLocaleString(),
            details: "Created from frontend/index.html",
            teacherId: "PUT_A_REAL_USER_ID_HERE"
          };

          const res = await fetch(API_BASE + "/events", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || "Failed to create event");
          }

          qrMessage.textContent = "Event created! ID: " + (data._id || "");
          qrMessage.classList.add("success");
        } catch (err) {
          qrMessage.textContent = err.message || "Something went wrong";
          qrMessage.classList.add("error");
        } finally {
          createEventButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
