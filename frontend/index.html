<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QR Attendance — Sign in</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="auth-wrap">
      <h1>QR Attendance - V1.1</h1>

      <div class="tabs" role="tablist">
        <button id="tab-login" class="active" type="button">Login</button>
        <button id="tab-register" type="button">Register</button>
      </div>

      <form id="login-form">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" autocomplete="email" required />
        <label for="login-password">Password</label>
        <input id="login-password" type="password" autocomplete="current-password" required />
        <button type="submit" class="primary">Login</button>
        <div id="login-message" class="message"></div>
      </form>

      <form id="register-form" style="display: none">
        <label for="reg-name">Name</label>
        <input id="reg-name" type="text" required />
        <label for="reg-email">Email</label>
        <input id="reg-email" type="email" required />
        <label for="reg-password">Password (6+ chars)</label>
        <input id="reg-password" type="password" required />
        <label for="reg-role">Role</label>
        <select id="reg-role" required>
          <option value="student">Student</option>
          <option value="instructor">Instructor (Teacher)</option>
        </select>
        <button type="submit" class="primary">Create account</button>
        <div id="reg-message" class="message"></div>
      </form>
    </div>

    <script type="module">
      import { apiFetch, auth } from "/js/api.js";

      const loginForm = document.getElementById("login-form");
      const registerForm = document.getElementById("register-form");
      const tabLogin = document.getElementById("tab-login");
      const tabRegister = document.getElementById("tab-register");

      // If already logged in, bounce to the right next page.
      const params = new URLSearchParams(location.search);
      const next = params.get("next");
      if (auth.token && auth.user) {
        location.href = next || "/dashboard.html";
      }

      tabLogin.addEventListener("click", () => {
        tabLogin.classList.add("active"); tabRegister.classList.remove("active");
        loginForm.style.display = ""; registerForm.style.display = "none";
      });
      tabRegister.addEventListener("click", () => {
        tabRegister.classList.add("active"); tabLogin.classList.remove("active");
        registerForm.style.display = ""; loginForm.style.display = "none";
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const msg = document.getElementById("login-message");
        msg.textContent = ""; msg.className = "message";
        try {
          const data = await apiFetch("/users/login", {
            method: "POST",
            authed: false,
            body: {
              email: document.getElementById("login-email").value.trim(),
              password: document.getElementById("login-password").value
            }
          });
          auth.save(data.token, data.user);
          location.href = next || "/dashboard.html";
        } catch (err) {
          msg.textContent = err.message; msg.classList.add("error");
        }
      });

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const msg = document.getElementById("reg-message");
        msg.textContent = ""; msg.className = "message";
        try {
          const data = await apiFetch("/users/register", {
            method: "POST",
            authed: false,
            body: {
              name: document.getElementById("reg-name").value.trim(),
              email: document.getElementById("reg-email").value.trim(),
              password: document.getElementById("reg-password").value,
              role: document.getElementById("reg-role").value
            }
          });
          auth.save(data.token, data.user);
          location.href = next || "/dashboard.html";
        } catch (err) {
          msg.textContent = err.message; msg.classList.add("error");
        }
      });
    </script>
  </body>
</html>
